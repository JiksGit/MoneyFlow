networks:
  moneyflow-net:
    driver: bridge

volumes:
  postgres-user-data:
  postgres-account-data:
  postgres-transfer-data:
  postgres-ledger-data:
  kafka-data:
  redis-data:
  prometheus-data:
  grafana-data:
  influxdb-data:

services:
  # ──────────────────────────────────────────────────────────
  # Databases
  # ──────────────────────────────────────────────────────────
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
      - ./user-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-account:
    image: postgres:16-alpine
    container_name: postgres-account
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5433:5432"
    volumes:
      - postgres-account-data:/var/lib/postgresql/data
      - ./account-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d accountdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-transfer:
    image: postgres:16-alpine
    container_name: postgres-transfer
    environment:
      POSTGRES_DB: transferdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5434:5432"
    volumes:
      - postgres-transfer-data:/var/lib/postgresql/data
      - ./transfer-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d transferdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ledger:
    image: postgres:16-alpine
    container_name: postgres-ledger
    environment:
      POSTGRES_DB: ledgerdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5435:5432"
    volumes:
      - postgres-ledger-data:/var/lib/postgresql/data
      - ./ledger-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d ledgerdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Kafka + Zookeeper
  # ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: moneyflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - moneyflow-net

  # ──────────────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Microservices
  # ──────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      postgres-user:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/userdb
      SPRING_DATASOURCE_USERNAME: moneyflow
      SPRING_DATASOURCE_PASSWORD: moneyflow123
      JWT_SECRET: moneyflow-super-secret-jwt-key-2024-at-least-256-bits-long
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service
    depends_on:
      postgres-account:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-account:5432/accountdb
      SPRING_DATASOURCE_USERNAME: moneyflow
      SPRING_DATASOURCE_PASSWORD: moneyflow123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: moneyflow-super-secret-jwt-key-2024-at-least-256-bits-long
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8082"
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  transfer-service:
    build:
      context: ./transfer-service
      dockerfile: Dockerfile
    container_name: transfer-service
    depends_on:
      postgres-transfer:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-transfer:5432/transferdb
      SPRING_DATASOURCE_USERNAME: moneyflow
      SPRING_DATASOURCE_PASSWORD: moneyflow123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: moneyflow-super-secret-jwt-key-2024-at-least-256-bits-long
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8083"
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  ledger-service:
    build:
      context: ./ledger-service
      dockerfile: Dockerfile
    container_name: ledger-service
    depends_on:
      postgres-ledger:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ledger:5432/ledgerdb
      SPRING_DATASOURCE_USERNAME: moneyflow
      SPRING_DATASOURCE_PASSWORD: moneyflow123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: moneyflow-super-secret-jwt-key-2024-at-least-256-bits-long
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8084:8084"
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: moneyflow-super-secret-jwt-key-2024-at-least-256-bits-long
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8085:8085"
    networks:
      - moneyflow-net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      user-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      transfer-service:
        condition: service_healthy
    environment:
      USER_SERVICE_URL: http://user-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      TRANSFER_SERVICE_URL: http://transfer-service:8083
      LEDGER_SERVICE_URL: http://ledger-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: moneyflow-super-secret-jwt-key-2024-at-least-256-bits-long
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - moneyflow-net

  # ──────────────────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8080
    networks:
      - moneyflow-net
    depends_on:
      - api-gateway

  # ──────────────────────────────────────────────────────────
  # Monitoring
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - moneyflow-net

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - influxdb
    networks:
      - moneyflow-net

  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: moneyflow
      DOCKER_INFLUXDB_INIT_BUCKET: k6
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: moneyflow-influxdb-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - moneyflow-net
