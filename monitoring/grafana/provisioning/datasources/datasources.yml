apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: moneyflow
      defaultBucket: k6
      tlsSkipVerify: true
    secureJsonData:
      token: moneyflow-influxdb-token
    editable: false
