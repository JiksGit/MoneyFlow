name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:       # 수동 배포도 가능
    inputs:
      service:
        description: '특정 서비스만 배포 (비워두면 전체)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/moneyflow

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 변경된 서비스 감지
  # ─────────────────────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changed
        run: |
          # 수동 트리거에서 특정 서비스 지정한 경우
          if [ -n "${{ github.event.inputs.service }}" ]; then
            echo "services=[\"${{ github.event.inputs.service }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi

          SERVICES=()
          for svc in api-gateway user-service account-service transfer-service ledger-service notification-service frontend; do
            if git diff --name-only HEAD~1 HEAD | grep -q "^${svc}/"; then
              SERVICES+=("\"${svc}\"")
            fi
          done

          # 변경 없으면 전체 배포
          if [ ${#SERVICES[@]} -eq 0 ]; then
            SERVICES=('"api-gateway"' '"user-service"' '"account-service"' '"transfer-service"' '"ledger-service"' '"notification-service"' '"frontend"')
          fi

          JSON="[$(IFS=,; echo "${SERVICES[*]}")]"
          echo "services=${JSON}" >> $GITHUB_OUTPUT
          echo "Changed services: ${JSON}"

  # ─────────────────────────────────────────────────────────────────────────
  # Docker 이미지 빌드 & ghcr.io Push
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build & Push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Output image digest
        run: echo "Pushed ${{ matrix.service }} → ${{ steps.meta.outputs.tags }}"

  # ─────────────────────────────────────────────────────────────────────────
  # 로컬 Docker Host에 배포 (Self-hosted runner 또는 SSH 사용)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: self-hosted       # 로컬 머신에 GitHub Actions runner 설치 시 사용
    if: success()
    env:
      COMPOSE_FILE: docker-compose.yml
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: |
          SERVICES="${{ join(fromJson(needs.detect-changes.outputs.services), ' ') }}"
          for svc in $SERVICES; do
            docker pull ghcr.io/${OWNER}/moneyflow-${svc}:latest || true
          done

      - name: Update docker-compose to use registry images
        run: |
          # 변경된 서비스만 image: 로 교체하여 pull된 이미지 사용
          for svc in $(echo '${{ needs.detect-changes.outputs.services }}' | jq -r '.[]'); do
            export IMAGE="ghcr.io/${OWNER}/moneyflow-${svc}:latest"
            yq -i "(.services.\"${svc}\".image) = \"${IMAGE}\" | del(.services.\"${svc}\".build)" \
              docker-compose.yml
          done

      - name: Deploy with zero-downtime rolling update
        run: |
          SERVICES=$(echo '${{ needs.detect-changes.outputs.services }}' | jq -r '.[]' | tr '\n' ' ')
          docker compose up -d --no-build --remove-orphans $SERVICES

      - name: Health check
        run: |
          echo "Waiting for services to be healthy..."
          sleep 15
          docker compose ps --format json | jq -r '.[] | "\(.Name): \(.Health // .State)"'

      - name: Notify result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COMMIT="${{ github.sha }}"
          echo "Deploy ${STATUS} — commit ${COMMIT:0:7}"
