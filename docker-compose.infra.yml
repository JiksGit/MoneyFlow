# 인프라만 띄우는 파일 (DB, Kafka, Redis)
# 사용법: docker compose -f docker-compose.infra.yml up -d

networks:
  moneyflow-net:
    driver: bridge

services:
  # ── PostgreSQL 4개 ──────────────────────────────────────────────────────
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5432:5432"
    volumes:
      - ./user-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d userdb"]
      interval: 5s
      retries: 10

  postgres-account:
    image: postgres:16-alpine
    container_name: postgres-account
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5433:5432"
    volumes:
      - ./account-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d accountdb"]
      interval: 5s
      retries: 10

  postgres-transfer:
    image: postgres:16-alpine
    container_name: postgres-transfer
    environment:
      POSTGRES_DB: transferdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5434:5432"
    volumes:
      - ./transfer-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d transferdb"]
      interval: 5s
      retries: 10

  postgres-ledger:
    image: postgres:16-alpine
    container_name: postgres-ledger
    environment:
      POSTGRES_DB: ledgerdb
      POSTGRES_USER: moneyflow
      POSTGRES_PASSWORD: moneyflow123
    ports:
      - "5435:5432"
    volumes:
      - ./ledger-service/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - moneyflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneyflow -d ledgerdb"]
      interval: 5s
      retries: 10

  # ── Zookeeper + Kafka ───────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - moneyflow-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # 로컬에서 접속할 때는 localhost:9092 사용
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - moneyflow-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - moneyflow-net

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - moneyflow-net
